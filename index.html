<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&D Приключение | Интерактивная карта</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0d1117;
        min-height: 100vh;
        color: #c9d1d9;
        overflow: hidden;
      }

      .main-header {
        background: linear-gradient(180deg, #1a0a2e 0%, #16213e 100%);
        padding: 15px 20px;
        text-align: center;
        border-bottom: 2px solid #ffd70033;
        z-index: 1000;
        position: relative;
      }

      .main-title {
        font-size: 2em;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        color: #ffd700;
        font-weight: 800;
        letter-spacing: 3px;
      }

      .subtitle {
        color: #8b949e;
        font-size: 0.9em;
        font-style: italic;
      }

      .game-layout {
        display: flex;
        height: calc(100vh - 100px);
      }

      /* Боковая панель */
      .sidebar {
        width: 350px;
        min-width: 350px;
        background: #161b22;
        border-right: 1px solid #30363d;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .panel-tabs {
        display: flex;
        background: #0d1117;
        border-bottom: 1px solid #30363d;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .panel-tab {
        flex: 1;
        padding: 12px 8px;
        text-align: center;
        cursor: pointer;
        background: transparent;
        border: none;
        color: #8b949e;
        font-size: 0.8em;
        transition: all 0.3s;
        border-bottom: 2px solid transparent;
      }

      .panel-tab:hover {
        color: #c9d1d9;
        background: #1c2128;
      }

      .panel-tab.active {
        color: #ffd700;
        border-bottom-color: #ffd700;
        background: #161b22;
      }

      .panel-content {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
      }

      .panel-section {
        display: none;
      }

      .panel-section.active {
        display: block;
      }

      /* Карта */
      .map-wrapper {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #0d1117;
      }

      .map-container {
        width: 100%;
        height: 100%;
        position: relative;
        cursor: grab;
      }

      .map-container:active {
        cursor: grabbing;
      }

      .map-canvas {
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: 0 0;
      }

      /* Тайлы карты */
      .map-tile {
        position: absolute;
        width: 80px;
        height: 80px;
        cursor: pointer;
        transition: all 0.2s;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5em;
        user-select: none;
      }

      .map-tile:hover {
        transform: scale(1.05);
        z-index: 5;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      }

      .tile-forest {
        background: linear-gradient(135deg, #1a3a1a, #2d5a2d);
        border: 2px solid #3a6b3a;
      }
      .tile-mountain {
        background: linear-gradient(135deg, #3a3a3a, #5a5a5a);
        border: 2px solid #6b6b6b;
      }
      .tile-dungeon {
        background: linear-gradient(135deg, #1a1a2e, #2d2d5a);
        border: 2px solid #4a4a8a;
      }
      .tile-town {
        background: linear-gradient(135deg, #3a2a1a, #5a3a2a);
        border: 2px solid #8a6b4a;
      }
      .tile-water {
        background: linear-gradient(135deg, #1a2a3a, #2a4a6a);
        border: 2px solid #3a6a9a;
      }
      .tile-swamp {
        background: linear-gradient(135deg, #1a2a1a, #2a3a1a);
        border: 2px solid #4a5a2a;
      }
      .tile-ruins {
        background: linear-gradient(135deg, #2a2a2a, #4a4a4a);
        border: 2px solid #6a6a6a;
      }

      /* ИГРОК НА КАРТЕ */
      .player-marker {
        position: absolute;
        width: 70px;
        height: 70px;
        pointer-events: none;
        z-index: 1000;
        transition: all 0.3s ease;
        filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
      }

      .player-sprite {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.5em;
        animation: playerFloat 2s ease-in-out infinite;
      }

      @keyframes playerFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .player-glow {
        position: absolute;
        bottom: -5px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 10px;
        background: radial-gradient(
          ellipse,
          rgba(255, 215, 0, 0.6),
          transparent
        );
        border-radius: 50%;
        animation: glowPulse 2s ease-in-out infinite;
      }

      @keyframes glowPulse {
        0%,
        100% {
          opacity: 0.5;
          transform: translateX(-50%) scale(1);
        }
        50% {
          opacity: 1;
          transform: translateX(-50%) scale(1.3);
        }
      }

      /* Мини-карта */
      .minimap {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 200px;
        height: 150px;
        background: #161b22;
        border: 2px solid #30363d;
        border-radius: 10px;
        overflow: hidden;
        opacity: 0.7;
        transition: opacity 0.3s;
        z-index: 100;
      }

      .minimap:hover {
        opacity: 1;
      }

      .minimap-canvas {
        width: 100%;
        height: 100%;
      }

      /* Информационная панель */
      .info-bar {
        position: absolute;
        top: 20px;
        left: 20px;
        background: #161b22e8;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 15px 20px;
        z-index: 100;
        backdrop-filter: blur(10px);
        max-width: 280px;
        min-width: 250px;
      }

      .info-bar h3 {
        color: #ffd700;
        margin-bottom: 5px;
        font-size: 1.1em;
      }

      .info-bar p {
        font-size: 0.85em;
        color: #8b949e;
        margin: 3px 0;
      }

      .player-stats {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #30363d;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }

      .stat-item {
        font-size: 0.8em;
      }

      .stat-item span {
        color: #ffd700;
      }

      /* Кнопки управления */
      .map-controls {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        gap: 10px;
        z-index: 100;
      }

      .map-btn {
        background: #161b22;
        border: 1px solid #30363d;
        color: #c9d1d9;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.2em;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .map-btn:hover {
        background: #1c2128;
        border-color: #ffd700;
      }

      /* Стили панелей */
      .dice-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 15px;
      }

      .dice-btn {
        padding: 12px 8px;
        border-radius: 8px;
        border: 1px solid #30363d;
        background: #21262d;
        color: #c9d1d9;
        cursor: pointer;
        transition: all 0.3s;
        font-weight: 600;
        font-size: 1em;
      }

      .dice-btn:hover {
        background: #30363d;
        border-color: #ffd700;
        color: #ffd700;
        transform: translateY(-2px);
      }

      .gen-btn {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(135deg, #8b6914, #ffd700);
        color: #0d1117;
        cursor: pointer;
        font-weight: 700;
        transition: all 0.3s;
        margin: 5px 0;
        font-size: 0.95em;
      }

      .gen-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
      }

      .gen-btn.secondary {
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
      }

      .result-box {
        background: #21262d;
        border-radius: 10px;
        padding: 15px;
        margin: 10px 0;
        text-align: center;
        border: 1px solid #30363d;
      }

      .result-number {
        font-size: 2.5em;
        color: #ffd700;
        font-weight: 700;
      }

      .history-log {
        max-height: 120px;
        overflow-y: auto;
        font-size: 0.75em;
        background: #0d1117;
        border-radius: 8px;
        padding: 8px;
        margin-top: 10px;
      }

      .history-log div {
        padding: 2px 0;
        border-bottom: 1px solid #1c2128;
        color: #8b949e;
      }

      input[type="number"] {
        width: 50px;
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 6px;
        border-radius: 5px;
        text-align: center;
        font-size: 0.9em;
      }

      @media (max-width: 768px) {
        .game-layout {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          min-width: 100%;
          height: 40vh;
        }
        .map-wrapper {
          height: 60vh;
        }
        .info-bar {
          top: 5px;
          left: 5px;
          max-width: 180px;
          padding: 10px;
          font-size: 0.7em;
        }
        .player-marker {
          width: 50px;
          height: 50px;
        }
        .player-sprite {
          font-size: 2.5em;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-header">
      <h1 class="main-title">⚔️ Карта Приключений ⚔️</h1>
      <p class="subtitle">
        Исследуйте мир | Бросайте кости | Находите сокровища
      </p>
    </div>

    <div class="game-layout">
      <!-- Боковая панель -->
      <div class="sidebar">
        <div class="panel-tabs">
          <button class="panel-tab active" onclick="switchPanel('dice')">
            🎲 Кости
          </button>
          <button class="panel-tab" onclick="switchPanel('character')">
            👤 Герой
          </button>
          <button class="panel-tab" onclick="switchPanel('loot')">
            💎 Лут
          </button>
          <button class="panel-tab" onclick="switchPanel('encounter')">
            ⚔️ Встречи
          </button>
        </div>

        <div class="panel-content">
          <!-- Панель костей -->
          <div id="panel-dice" class="panel-section active">
            <h3 style="color: #ffd700; margin-bottom: 10px">Бросок костей</h3>
            <div class="dice-grid">
              <button class="dice-btn" onclick="quickRoll(4)">d4</button>
              <button class="dice-btn" onclick="quickRoll(6)">d6</button>
              <button class="dice-btn" onclick="quickRoll(8)">d8</button>
              <button class="dice-btn" onclick="quickRoll(10)">d10</button>
              <button class="dice-btn" onclick="quickRoll(12)">d12</button>
              <button class="dice-btn" onclick="quickRoll(20)">d20</button>
            </div>

            <div
              style="
                display: flex;
                gap: 8px;
                margin: 10px 0;
                align-items: center;
              "
            >
              <input type="number" id="quickCount" value="1" min="1" />
              <span>d</span>
              <input type="number" id="quickSides" value="20" min="2" />
              <button
                class="gen-btn secondary"
                onclick="customQuickRoll()"
                style="flex: 1"
              >
                Бросить
              </button>
            </div>

            <div class="result-box">
              <div class="result-number" id="quickResult">🎯</div>
              <div id="quickDetail" style="font-size: 0.85em; color: #8b949e">
                Нажмите на кость
              </div>
            </div>

            <div class="history-log" id="diceHistory"></div>
          </div>

          <!-- Панель персонажа -->
          <div id="panel-character" class="panel-section">
            <h3 style="color: #ffd700; margin-bottom: 10px">Ваш герой</h3>
            <button class="gen-btn" onclick="generateCharacter()">
              🎭 Создать героя
            </button>
            <div id="characterInfo" style="margin-top: 10px"></div>
          </div>

          <!-- Панель лута -->
          <div id="panel-loot" class="panel-section">
            <h3 style="color: #ffd700; margin-bottom: 10px">Сокровища</h3>
            <button class="gen-btn" onclick="generateLoot()">
              💎 Найти лут
            </button>
            <div id="lootInfo" style="margin-top: 10px"></div>
          </div>

          <!-- Панель встреч -->
          <div id="panel-encounter" class="panel-section">
            <h3 style="color: #ffd700; margin-bottom: 10px">
              Случайная встреча
            </h3>
            <button class="gen-btn" onclick="generateEncounter()">
              ⚔️ Встретить врага
            </button>
            <div id="encounterInfo" style="margin-top: 10px"></div>
          </div>
        </div>
      </div>

      <!-- Карта -->
      <div class="map-wrapper" id="mapWrapper">
        <div class="map-container" id="mapContainer">
          <div class="map-canvas" id="mapCanvas"></div>
          <!-- ИГРОК НА КАРТЕ -->
          <div class="player-marker" id="playerMarker">
            <div class="player-sprite">🧙‍♂️</div>
            <div class="player-glow"></div>
          </div>
        </div>

        <!-- Мини-карта -->
        <div class="minimap">
          <canvas class="minimap-canvas" id="minimapCanvas"></canvas>
        </div>

        <!-- Информационная панель -->
        <div class="info-bar" id="infoBar">
          <h3 id="locationName">🌲 Дремучий лес</h3>
          <p id="locationDesc">Вы начинаете свой путь в густом лесу.</p>
          <div class="player-stats">
            <div class="stat-item">📍 X: <span id="coordX">5</span></div>
            <div class="stat-item">📍 Y: <span id="coordY">5</span></div>
            <div class="stat-item">👣 Шаги: <span id="moveCount">0</span></div>
            <div class="stat-item">⚔️ Ур: <span id="playerLevel">1</span></div>
            <div class="stat-item">❤️ HP: <span id="playerHP">20</span></div>
            <div class="stat-item">💰 Au: <span id="playerGold">50</span></div>
          </div>
        </div>

        <!-- Кнопки управления -->
        <div class="map-controls">
          <button class="map-btn" onclick="zoomMap(0.2)" title="Приблизить">
            ➕
          </button>
          <button class="map-btn" onclick="zoomMap(-0.2)" title="Отдалить">
            ➖
          </button>
          <button
            class="map-btn"
            onclick="resetMap()"
            title="Центрировать на игроке"
          >
            🎯
          </button>
        </div>
      </div>
    </div>

    <script>
      // ==================== ДАННЫЕ ИГРЫ ====================
      const MAP_WIDTH = 25;
      const MAP_HEIGHT = 18;
      const TILE_SIZE = 80;

      const TILE_TYPES = {
        forest: {
          class: "tile-forest",
          icon: "🌲",
          name: "Лес",
          color: "#2d5a2d",
        },
        mountain: {
          class: "tile-mountain",
          icon: "⛰️",
          name: "Горы",
          color: "#5a5a5a",
        },
        dungeon: {
          class: "tile-dungeon",
          icon: "🏰",
          name: "Подземелье",
          color: "#2d2d5a",
        },
        town: {
          class: "tile-town",
          icon: "🏘️",
          name: "Город",
          color: "#5a3a2a",
        },
        water: {
          class: "tile-water",
          icon: "🌊",
          name: "Озеро",
          color: "#2a4a6a",
        },
        swamp: {
          class: "tile-swamp",
          icon: "💀",
          name: "Болото",
          color: "#2a3a1a",
        },
        ruins: {
          class: "tile-ruins",
          icon: "🏚️",
          name: "Руины",
          color: "#4a4a4a",
        },
      };

      let gameMap = [];
      let playerPosition = { x: 5, y: 5 };
      let moveCounter = 0;
      let playerStats = {
        level: 1,
        hp: 20,
        maxHp: 20,
        gold: 50,
        name: "Герой",
        race: "Человек",
        class: "Воин",
      };
      let currentZoom = 1;
      let mapOffset = { x: 0, y: 0 };
      let isDragging = false;
      let dragStart = { x: 0, y: 0 };

      // ==================== ГЕНЕРАЦИЯ КАРТЫ ====================
      function generateMap() {
        gameMap = Array.from({ length: MAP_HEIGHT }, () =>
          Array.from({ length: MAP_WIDTH }, () => "forest"),
        );

        // Горы
        for (let y = 2; y < 6; y++) {
          for (let x = 12; x < 19; x++) {
            if (Math.random() > 0.3) gameMap[y][x] = "mountain";
          }
        }

        // Города
        gameMap[4][4] = "town";
        gameMap[7][15] = "town";
        gameMap[14][3] = "town";
        gameMap[2][20] = "town";

        // Подземелья
        gameMap[3][14] = "dungeon";
        gameMap[12][18] = "dungeon";
        gameMap[8][2] = "dungeon";
        gameMap[15][10] = "dungeon";

        // Озёра
        for (let y = 9; y < 12; y++) {
          for (let x = 7; x < 10; x++) {
            gameMap[y][x] = "water";
          }
        }

        // Болота
        for (let y = 13; y < 17; y++) {
          for (let x = 12; x < 16; x++) {
            if (Math.random() > 0.4) gameMap[y][x] = "swamp";
          }
        }

        // Руины
        gameMap[10][5] = "ruins";
        gameMap[15][20] = "ruins";
        gameMap[1][10] = "ruins";
        gameMap[6][22] = "ruins";
      }

      // ==================== ОТРИСОВКА КАРТЫ ====================
      function renderMap() {
        const canvas = document.getElementById("mapCanvas");
        canvas.style.width = `${MAP_WIDTH * TILE_SIZE}px`;
        canvas.style.height = `${MAP_HEIGHT * TILE_SIZE}px`;
        canvas.innerHTML = "";

        const startX = Math.max(
          0,
          Math.floor(-mapOffset.x / TILE_SIZE / currentZoom),
        );
        const startY = Math.max(
          0,
          Math.floor(-mapOffset.y / TILE_SIZE / currentZoom),
        );
        const endX = Math.min(
          MAP_WIDTH,
          startX + Math.ceil(window.innerWidth / TILE_SIZE / currentZoom) + 2,
        );
        const endY = Math.min(
          MAP_HEIGHT,
          startY + Math.ceil(window.innerHeight / TILE_SIZE / currentZoom) + 2,
        );

        for (let y = startY; y < endY; y++) {
          for (let x = startX; x < endX; x++) {
            const tileType = TILE_TYPES[gameMap[y][x]];
            const tile = document.createElement("div");
            tile.className = `map-tile ${tileType.class}`;
            tile.style.left = `${x * TILE_SIZE}px`;
            tile.style.top = `${y * TILE_SIZE}px`;
            tile.style.width = `${TILE_SIZE}px`;
            tile.style.height = `${TILE_SIZE}px`;
            tile.textContent = tileType.icon;
            tile.addEventListener("click", (e) => {
              e.stopPropagation();
              movePlayer(x, y);
            });
            canvas.appendChild(tile);
          }
        }

        // Применяем трансформацию к canvas
        canvas.style.transform = `translate(${mapOffset.x}px, ${mapOffset.y}px) scale(${currentZoom})`;

        // Обновляем позицию игрока
        updatePlayerMarker();
        updateMinimap();
        updateInfoBar();
      }

      // ==================== ОТОБРАЖЕНИЕ ИГРОКА ====================
      function updatePlayerMarker() {
        const marker = document.getElementById("playerMarker");
        const tileCenterX = playerPosition.x * TILE_SIZE + TILE_SIZE / 2;
        const tileCenterY = playerPosition.y * TILE_SIZE + TILE_SIZE / 2;

        // Позиция с учётом зума и смещения
        const screenX =
          tileCenterX * currentZoom + mapOffset.x - 35 * currentZoom;
        const screenY =
          tileCenterY * currentZoom + mapOffset.y - 60 * currentZoom;

        marker.style.left = `${screenX}px`;
        marker.style.top = `${screenY}px`;
        marker.style.transform = `scale(${currentZoom})`;
      }

      // ==================== МИНИ-КАРТА ====================
      function updateMinimap() {
        const canvas = document.getElementById("minimapCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 200;
        canvas.height = 150;

        const scaleX = canvas.width / (MAP_WIDTH * TILE_SIZE);
        const scaleY = canvas.height / (MAP_HEIGHT * TILE_SIZE);
        const scale = Math.min(scaleX, scaleY);

        ctx.fillStyle = "#0d1117";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Тайлы
        for (let y = 0; y < MAP_HEIGHT; y++) {
          for (let x = 0; x < MAP_WIDTH; x++) {
            ctx.fillStyle = TILE_TYPES[gameMap[y][x]].color;
            ctx.fillRect(
              x * TILE_SIZE * scale,
              y * TILE_SIZE * scale,
              TILE_SIZE * scale,
              TILE_SIZE * scale,
            );
          }
        }

        // Игрок на мини-карте
        const playerMiniX =
          playerPosition.x * TILE_SIZE * scale + (TILE_SIZE * scale) / 2;
        const playerMiniY =
          playerPosition.y * TILE_SIZE * scale + (TILE_SIZE * scale) / 2;

        // Свечение
        ctx.fillStyle = "rgba(255, 215, 0, 0.3)";
        ctx.beginPath();
        ctx.arc(playerMiniX, playerMiniY, 8, 0, Math.PI * 2);
        ctx.fill();

        // Точка игрока
        ctx.fillStyle = "#ffd700";
        ctx.beginPath();
        ctx.arc(playerMiniX, playerMiniY, 4, 0, Math.PI * 2);
        ctx.fill();

        // Область просмотра
        ctx.strokeStyle = "#ffffff66";
        ctx.lineWidth = 2;
        const viewX = (-mapOffset.x * scale) / currentZoom;
        const viewY = (-mapOffset.y * scale) / currentZoom;
        const viewW = (window.innerWidth * scale) / currentZoom;
        const viewH = (window.innerHeight * scale) / currentZoom;
        ctx.strokeRect(viewX, viewY, viewW, viewH);
      }

      // ==================== ИНФО-ПАНЕЛЬ ====================
      function updateInfoBar() {
        const tileType =
          TILE_TYPES[gameMap[playerPosition.y][playerPosition.x]];
        document.getElementById("locationName").textContent =
          `${tileType.icon} ${tileType.name}`;
        document.getElementById("coordX").textContent = playerPosition.x;
        document.getElementById("coordY").textContent = playerPosition.y;
        document.getElementById("moveCount").textContent = moveCounter;
        document.getElementById("playerLevel").textContent = playerStats.level;
        document.getElementById("playerHP").textContent =
          `${playerStats.hp}/${playerStats.maxHp}`;
        document.getElementById("playerGold").textContent = playerStats.gold;

        const descriptions = {
          forest: "Густой лес полон тайн. Слышны звуки диких зверей.",
          mountain: "Величественные горы. Где-то здесь скрыты древние шахты.",
          dungeon: "Тёмное подземелье. Опасные монстры и ценные сокровища.",
          town: "Шумный город. Можно найти убежище и торговцев.",
          water: "Спокойные воды. На дне озера что-то блестит.",
          swamp: "Зловонное болото. Пристанище нежити.",
          ruins: "Древние руины. Здесь спрятаны редкие артефакты.",
        };

        document.getElementById("locationDesc").textContent =
          descriptions[gameMap[playerPosition.y][playerPosition.x]];
      }

      // ==================== ПЕРЕМЕЩЕНИЕ ИГРОКА ====================
      function movePlayer(x, y) {
        const distance =
          Math.abs(x - playerPosition.x) + Math.abs(y - playerPosition.y);

        if (distance === 0) return;

        // Можно ходить только на соседние клетки (включая диагонали)
        const dx = Math.abs(x - playerPosition.x);
        const dy = Math.abs(y - playerPosition.y);

        if (dx <= 1 && dy <= 1 && !(dx === 0 && dy === 0)) {
          playerPosition.x = x;
          playerPosition.y = y;
          moveCounter++;

          // Восстановление HP при движении
          if (moveCounter % 5 === 0 && playerStats.hp < playerStats.maxHp) {
            playerStats.hp = Math.min(playerStats.maxHp, playerStats.hp + 1);
          }

          centerOnPlayer();

          // Случайное событие
          if (Math.random() < 0.3) {
            triggerRandomEvent();
          }

          renderMap();
        } else if (distance > 1) {
          showToast("🗺️ Используйте WASD или кликайте на соседние клетки");
        }
      }

      function centerOnPlayer() {
        const wrapper = document.getElementById("mapWrapper");
        const centerX = playerPosition.x * TILE_SIZE * currentZoom;
        const centerY = playerPosition.y * TILE_SIZE * currentZoom;

        mapOffset.x = wrapper.offsetWidth / 2 - centerX;
        mapOffset.y = wrapper.offsetHeight / 2 - centerY;
      }

      function zoomMap(delta) {
        currentZoom = Math.max(0.5, Math.min(2, currentZoom + delta));
        renderMap();
      }

      function resetMap() {
        currentZoom = 1;
        centerOnPlayer();
        renderMap();
        showToast("🎯 Карта центрирована на игроке");
      }

      function showToast(message) {
        const toast = document.createElement("div");
        toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: #161b22;
                color: #ffd700;
                padding: 10px 20px;
                border-radius: 20px;
                border: 1px solid #30363d;
                z-index: 9999;
                animation: fadeInOut 2s ease;
            `;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }

      function triggerRandomEvent() {
        const events = [
          "✨ Вы нашли несколько золотых монет! (+10 Au)",
          "👂 Странный шум раздаётся неподалёку...",
          "🐾 Вы заметили следы крупного зверя.",
          "📜 Старый свиток валяется на земле.",
          "🐇 Мимо пробежал испуганный заяц.",
          "💨 Ветер доносит запах дыма.",
          "⚔️ Вы слышите далёкий звон мечей.",
          "💎 Что-то блестит под кустом! (+5 Au)",
        ];

        const event = events[Math.floor(Math.random() * events.length)];

        if (event.includes("+10 Au")) playerStats.gold += 10;
        if (event.includes("+5 Au")) playerStats.gold += 5;

        showToast(event);
      }

      // ==================== ПЕРЕТАСКИВАНИЕ КАРТЫ ====================
      const mapContainer = document.getElementById("mapContainer");

      mapContainer.addEventListener("mousedown", (e) => {
        if (e.target.closest(".map-tile")) return;
        isDragging = true;
        dragStart = { x: e.clientX - mapOffset.x, y: e.clientY - mapOffset.y };
        mapContainer.style.cursor = "grabbing";
      });

      window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        mapOffset.x = e.clientX - dragStart.x;
        mapOffset.y = e.clientY - dragStart.y;
        renderMap();
      });

      window.addEventListener("mouseup", () => {
        isDragging = false;
        mapContainer.style.cursor = "grab";
      });

      // ==================== УПРАВЛЕНИЕ КЛАВИШАМИ ====================
      window.addEventListener("keydown", (e) => {
        // Не двигаемся, если фокус в поле ввода
        if (e.target.tagName === "INPUT") return;

        let newX = playerPosition.x;
        let newY = playerPosition.y;

        switch (e.key.toLowerCase()) {
          case "w":
          case "arrowup":
            newY--;
            e.preventDefault();
            break;
          case "s":
          case "arrowdown":
            newY++;
            e.preventDefault();
            break;
          case "a":
          case "arrowleft":
            newX--;
            e.preventDefault();
            break;
          case "d":
          case "arrowright":
            newX++;
            e.preventDefault();
            break;
          default:
            return;
        }

        if (newX >= 0 && newX < MAP_WIDTH && newY >= 0 && newY < MAP_HEIGHT) {
          movePlayer(newX, newY);
        }
      });

      // Масштабирование колёсиком
      document.getElementById("mapWrapper").addEventListener("wheel", (e) => {
        e.preventDefault();
        zoomMap(e.deltaY > 0 ? -0.1 : 0.1);
      });

      // ==================== ФУНКЦИИ ПАНЕЛЕЙ ====================
      function switchPanel(panelName) {
        document
          .querySelectorAll(".panel-section")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".panel-tab")
          .forEach((t) => t.classList.remove("active"));

        document.getElementById(`panel-${panelName}`).classList.add("active");
        event.target.classList.add("active");
      }

      // Броски костей
      let diceHistoryArray = [];

      function quickRoll(sides) {
        const result = Math.floor(Math.random() * sides) + 1;
        document.getElementById("quickResult").textContent = result;

        let detail = `d${sides}: ${result}`;
        if (sides === 20) {
          if (result === 20) detail += " 🎉 NAT 20!";
          if (result === 1) detail += " 💀 NAT 1!";
        }
        document.getElementById("quickDetail").textContent = detail;

        diceHistoryArray.unshift(detail);
        if (diceHistoryArray.length > 15) diceHistoryArray.pop();
        updateDiceHistory();
      }

      function customQuickRoll() {
        const count =
          parseInt(document.getElementById("quickCount").value) || 1;
        const sides =
          parseInt(document.getElementById("quickSides").value) || 20;

        let rolls = [];
        let total = 0;
        for (let i = 0; i < count; i++) {
          const roll = Math.floor(Math.random() * sides) + 1;
          rolls.push(roll);
          total += roll;
        }

        document.getElementById("quickResult").textContent = total;
        document.getElementById("quickDetail").textContent =
          `${count}d${sides}: [${rolls.join(", ")}] = ${total}`;

        diceHistoryArray.unshift(`${count}d${sides}: ${total}`);
        if (diceHistoryArray.length > 15) diceHistoryArray.pop();
        updateDiceHistory();
      }

      function updateDiceHistory() {
        document.getElementById("diceHistory").innerHTML = diceHistoryArray
          .map((h) => `<div>${h}</div>`)
          .join("");
      }

      // Генератор персонажа
      function generateCharacter() {
        const races = [
          "Человек",
          "Эльф",
          "Дварф",
          "Полурослик",
          "Драконорождённый",
          "Тифлинг",
          "Гном",
          "Полуорк",
        ];
        const classes = [
          "Воин",
          "Маг",
          "Плут",
          "Жрец",
          "Паладин",
          "Следопыт",
          "Бард",
          "Друид",
        ];
        const names = {
          Человек: ["Артур", "Элис"],
          Эльф: ["Леголас", "Элара"],
          Дварф: ["Торин", "Брунгильда"],
          Полурослик: ["Бильбо", "Роза"],
          Драконорождённый: ["Арджухан", "Сафира"],
          Тифлинг: ["Азазель", "Лилит"],
          Гном: ["Тинкер", "Зигги"],
          Полуорк: ["Гром", "Урга"],
        };

        playerStats.race = races[Math.floor(Math.random() * races.length)];
        playerStats.class = classes[Math.floor(Math.random() * classes.length)];
        playerStats.name =
          names[playerStats.race][
            Math.floor(Math.random() * names[playerStats.race].length)
          ];
        playerStats.level = Math.floor(Math.random() * 5) + 1;
        playerStats.maxHp =
          Math.floor(Math.random() * 20) + 10 * playerStats.level;
        playerStats.hp = playerStats.maxHp;
        playerStats.gold = Math.floor(Math.random() * 100 * playerStats.level);

        document.getElementById("characterInfo").innerHTML = `
                <div class="result-box">
                    <h4 style="color: #ffd700;">${playerStats.name}</h4>
                    <p>${playerStats.race} • ${playerStats.class}</p>
                    <p>Уровень: ${playerStats.level}</p>
                    <p>❤️ HP: ${playerStats.hp}/${playerStats.maxHp}</p>
                    <p>💰 Золото: ${playerStats.gold}</p>
                    <p style="font-size: 0.8em; margin-top: 5px;">
                        Сила: ${Math.floor(Math.random() * 8 + 10)} | 
                        Ловк: ${Math.floor(Math.random() * 8 + 10)} | 
                        Инт: ${Math.floor(Math.random() * 8 + 10)}
                    </p>
                </div>
            `;

        updateInfoBar();
        showToast(`🎭 Создан герой: ${playerStats.name}`);
      }

      // Генератор лута
      function generateLoot() {
        const lootTables = {
          common: [
            {
              name: "Зелье лечения",
              desc: "Восстанавливает 2d4+2 HP",
              gold: 50,
            },
            { name: "Золотые монеты", desc: "Горсть монет", gold: 100 },
            { name: "Кинжал +1", desc: "Магическое оружие", gold: 200 },
            {
              name: "Карта сокровищ",
              desc: "Указывает путь к тайнику",
              gold: 75,
            },
          ],
          uncommon: [
            { name: "Эльфийский плащ", desc: "+5 к скрытности", gold: 500 },
            { name: "Меч +2", desc: "Магический меч", gold: 800 },
            { name: "Кольцо защиты", desc: "+1 к защите", gold: 600 },
            { name: "Сапоги скорости", desc: "Удвоенная скорость", gold: 400 },
          ],
          rare: [
            { name: "Доспех дракона", desc: "Сопротивление огню", gold: 3000 },
            { name: "Посох мага", desc: "+2 к заклинаниям", gold: 2500 },
            { name: "Кольцо регенерации", desc: "+1 HP/час", gold: 4000 },
          ],
        };

        const rarity = Math.random();
        let pool;
        if (rarity < 0.6) pool = lootTables.common;
        else if (rarity < 0.9) pool = lootTables.uncommon;
        else pool = lootTables.rare;

        const item = pool[Math.floor(Math.random() * pool.length)];
        playerStats.gold += item.gold;

        document.getElementById("lootInfo").innerHTML = `
                <div class="result-box">
                    <h4 style="color: #ffd700;">✨ ${item.name}</h4>
                    <p>${item.desc}</p>
                    <p style="color: #ffd700;">+${item.gold} золотых</p>
                    <p style="font-size: 0.8em; color: #8b949e;">
                        Найдено в: ${TILE_TYPES[gameMap[playerPosition.y][playerPosition.x]].name}
                    </p>
                </div>
            `;

        updateInfoBar();
        showToast(`💎 Получено: ${item.name}!`);
      }

      // Генератор встреч
      function generateEncounter() {
        const monsters = {
          forest: ["🐺 Волк", "🐻 Медведь", "🧚 Дриада", "🌳 Энт"],
          mountain: ["👹 Гоблин", "🦅 Гарпия", "🗿 Голем", "🐉 Виверна"],
          dungeon: ["💀 Скелет", "🟢 Слизь", "📦 Мимик", "🧙‍♂️ Тёмный маг"],
          town: ["🗡️ Вор", "🕯️ Культист", "🗡️ Ассасин"],
          water: ["🌊 Элементаль", "🧜‍♀️ Русалка", "🐟 Гигантская рыба"],
          swamp: ["🧟 Зомби", "👹 Болотный тролль", "🐍 Гидра"],
          ruins: ["👻 Призрак", "🗿 Голем", "💀 Некромант"],
        };

        const currentTile = gameMap[playerPosition.y][playerPosition.x];
        const monsterPool = monsters[currentTile] || monsters.forest;
        const monster =
          monsterPool[Math.floor(Math.random() * monsterPool.length)];
        const cr = Math.floor(Math.random() * 10) + 1;

        document.getElementById("encounterInfo").innerHTML = `
                <div class="result-box" style="border-color: #ff444466;">
                    <h4 style="color: #ff4444;">⚔️ ${monster}</h4>
                    <p>Уровень опасности: ${cr}</p>
                    <p style="font-size: 0.85em;">Бросьте d20 для атаки!</p>
                    <button class="gen-btn" onclick="quickRoll(20)" style="margin-top: 10px;">
                        🎲 Атаковать (d20)
                    </button>
                </div>
            `;

        showToast(`⚔️ Появился враг: ${monster}!`);
      }

      // ==================== ИНИЦИАЛИЗАЦИЯ ====================
      function initGame() {
        generateMap();
        centerOnPlayer();
        renderMap();
        generateCharacter();

        document.getElementById("quickResult").textContent = "🎯";
        document.getElementById("quickDetail").textContent = "Бросьте кость!";

        showToast("🗺️ Используйте WASD или клик для перемещения");
      }

      window.addEventListener("load", initGame);
      window.addEventListener("resize", renderMap);
    </script>
  </body>
</html>
